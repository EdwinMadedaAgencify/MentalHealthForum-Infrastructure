services:
  # ----------------------------------------------------
  # 1. KEYCLOAK SERVICE
  # ----------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.4.2
    container_name: mhf-keycloak
    command: start-dev --import-realm
    ports:
      - "9080:8080"
    environment:
      KEYCLOAK_ADMIN: mhf-temp-admin
      KEYCLOAK_ADMIN_PASSWORD: mhf-temp-password
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password

      KC_HEALTH_ENABLED: true
      KC_HOSTNAME_URL: http://localhost:9080
      KC_HTTP_ENABLED: true
      KC_PROXY: edge

    volumes:
      # Mounts declarative configuration file
      - ./keycloak/mentalhealthforum-realm.json:/opt/keycloak/data/import/mentalhealthforum-realm.json
      - ./keycloak/themes:/opt/keycloak/themes

    depends_on:
      keycloak-db:
        condition: service_healthy

    restart: always

  # ----------------------------------------------------
  # 2. KEYCLOAK POSTGRES DATABASE
  # ----------------------------------------------------
  keycloak-db:
    image: postgres:16-alpine
    container_name: mhf-keycloak-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak_user
      POSTGRES_PASSWORD: keycloak_password

    volumes:
      - ./databases/keycloak-db:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak_user -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

    restart: always

  # ----------------------------------------------------
  # 3. FORUM POSTGRES DATABASE (For Spring Boot Data)
  # ----------------------------------------------------
  forum-db:
    image: postgres:16-alpine
    container_name: mhf-forum-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: forum
      POSTGRES_USER: forum_user
      POSTGRES_PASSWORD: forum_password

    volumes:
      - ./databases/forum-db/data:/var/lib/postgresql/data
      - ./sql-scripts/init-forum-db.sql:/docker-entrypoint-initdb.d/init-forum-db.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forum_user -d forum"]
      interval: 5s
      timeout: 5s
      retries: 5

    restart: always

  # ----------------------------------------------------
  # 4. PGADMIN
  # ----------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: mhf-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mhf.co
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"
    depends_on:
      - keycloak-db
      - forum-db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: always

  # ----------------------------------------------------
  # 5. NOVU LEAN STACK
  # ----------------------------------------------------
  # --- CORE DATABASES ---
  # 5.1 MongoDB for Novu
  mhf-novu-mongodb:
    image: mongo:4.4 # Use 4.4 for better compatibility with local Novu setups
    ports:
      - "127.0.0.1:27017:27017"
    container_name: mhf-novu-mongodb
    volumes:
      - ./databases/mhf-novu-mongodb:/data/db
    restart: always

  # 5.2 Redis for Novu
  mhf-novu-redis:
    image: redis:alpine
    container_name: mhf-novu-redis
    restart: always

    # --- API SERVICE ---
  # 5.3 Novu API Service
  mhf-novu-api:
    image: ghcr.io/novuhq/novu/api:2.1.1
    container_name: mhf-novu-api
    ports:
      - "3000:3000"
    environment:
    - NODE_ENV=local
    - MONGO_URL=mongodb://mhf-novu-mongodb:27017/novu-db
    - REDIS_URL=redis://mhf-novu-redis:6379
    # ADD THESE TWO LINES BELOW
    - REDIS_HOST=mhf-novu-redis
    - REDIS_PORT=6379
    - JWT_SECRET=mhf_dev_secret_123
    - STORE_ENCRYPTION_KEY=12345678901234567890123456789012
    - FRONT_BASE_URL=http://localhost:4200
     # Ensure your Next.js origin is allowed
    - CORS_ALLOWED_ORIGINS=http://localhost:3001,http://localhost:3000,http://localhost:4200
      # We add every possible variation. Note the lack of spaces after commas.
#    - CORS_ALLOWED_HEADERS=Content-Type,Authorization,novu-api-version,x-novu-client-version,sentry-trace,baggage
    restart: always

  # --- WEB DASHBOARD (The Entry Point) ---
  # 5.4 Novu Dashboard
  mhf-novu-dashboard:
    image: ghcr.io/novuhq/novu/web:2.1.1
    container_name: mhf-novu-dashboard
    ports:
      - "4200:4200"
    environment:
      - REACT_APP_API_URL=http://localhost:3000
      - REACT_APP_WS_URL=http://localhost:3002
    restart: always

    # --- WEBSOCKET SERVICE ---
  # 5.6 Novu WebSocket Service
  mhf-novu-ws:
    image: ghcr.io/novuhq/novu/ws:2.1.1
    container_name: mhf-novu-ws
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=local
      - PORT=3002
      - MONGO_URL=mongodb://mhf-novu-mongodb:27017/novu-db
      - REDIS_URL=redis://mhf-novu-redis:6379
      - REDIS_HOST=mhf-novu-redis
      - REDIS_PORT=6379
      - JWT_SECRET=mhf_dev_secret_123 # MUST match API service
      # Added these for better local resolution
      - SOCKET_IO_PROTOCOL_VERSION=4
      - CORS_ALLOWED_ORIGINS=http://localhost:3001,http://localhost:4200,http://localhost:3000,http://127.0.0.1:3001
    restart: always

  # --- WORKER SERVICE ---
  # 5.7 Novu Worker Service (Optional - for background jobs)
  mhf-novu-worker:
    image: ghcr.io/novuhq/novu/worker:2.1.1
    container_name: mhf-novu-worker
    environment:
      - NODE_ENV=local
      - MONGO_URL=mongodb://mhf-novu-mongodb:27017/novu-db
      - REDIS_URL=redis://mhf-novu-redis:6379
      # These two are often required in 2.1.1 to stop it from defaulting to 127.0.0.1
      - REDIS_HOST=mhf-novu-redis
      - REDIS_PORT=6379
      # Sync the secret just in case
      - JWT_SECRET=mhf_dev_secret_123
      - STORE_ENCRYPTION_KEY=12345678901234567890123456789012
    restart: always


# ----------------------------------------------------
# NETWORK CONFIGURATION
# ----------------------------------------------------
networks:
  default:
    name: mhf-network
    driver: bridge









